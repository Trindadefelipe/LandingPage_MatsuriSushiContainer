<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D769"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8960C"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <!-- M letter stylized as chopsticks -->
  <text x="50" y="68" font-family="serif" font-size="50" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle">M</text>
  <!-- Decorative dot -->
  <circle cx="50" cy="82" r="3" fill="#DC2626"/>
</svg>
